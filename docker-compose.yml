version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: plagiat_postgres
    environment:
      POSTGRES_USER: plagiat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_secure_password}
      POSTGRES_DB: plagiattracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plagiat_user -d plagiattracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - plagiat_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: plagiat_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - plagiat_network

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plagiat_backend
    environment:
      # Database
      DATABASE_URL: postgresql://plagiat_user:${DB_PASSWORD:-changeme_secure_password}@postgres:5432/plagiattracker

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0

      # APIs Keys (optional, user-provided in app)
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      PUBMED_API_KEY: ${PUBMED_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # App Config
      SECRET_KEY: ${SECRET_KEY:-changeme_super_secret_key_min_32_chars}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}

      # Contact Info
      SUPPORT_EMAIL: checkone076@gmail.com
      PARTNER_PHONE: "+237690895735"

      # Hugging Face
      HF_HOME: /app/models
      TRANSFORMERS_CACHE: /app/models
    volumes:
      - ./backend:/app
      - huggingface_models:/app/models
      - uploaded_files:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - plagiat_network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plagiat_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPPORT_EMAIL: checkone076@gmail.com
      VITE_PARTNER_PHONE: "+237690895735"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - plagiat_network

  # MinIO (Object Storage - Optional)
  # Uncomment if you want local S3-compatible storage
  # minio:
  #   image: minio/minio:latest
  #   container_name: plagiat_minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   restart: unless-stopped
  #   networks:
  #     - plagiat_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  huggingface_models:
    driver: local
  uploaded_files:
    driver: local
  # minio_data:
  #   driver: local

networks:
  plagiat_network:
    driver: bridge
